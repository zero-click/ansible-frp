---
# 测试配置变量

# SSH测试配置
ssh_test_user: your_username
ssh_test_key_path: ~/.ssh/id_rsa

# 连接测试配置
connection_test_timeout: 10

# 服务测试配置
service_test_retries: 3
service_test_delay: 5

# 测试场景配置
test_scenarios:
  - name: ssh_tunnel
    enabled: true
    description: "Test SSH tunnel through FRP"

  - name: http_proxy
    enabled: false
    description: "Test HTTP proxy (requires web service)"

  - name: multiple_proxies
    enabled: false
    description: "Test multiple proxy configurations"
