# 测试环境inventory
# 用于开发和测试Ansible FRP配置

[frp_servers]
# localhost.server.local ansible_host=127.0.0.1
# test-server.example.com ansible_host=192.168.1.100

[frp_clients]
# localhost.client.local ansible_host=127.0.0.1
# test-client.example.com ansible_host=192.168.1.10

[frp_servers:vars]
ansible_user=root
ansible_python_interpreter=/usr/bin/python3
ansible_connection=local

[frp_clients:vars]
ansible_user=testuser
ansible_python_interpreter=/usr/bin/python3
ansible_connection=local

# 测试变量
test_mode=true
skip_service_start=true
